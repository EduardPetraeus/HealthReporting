name: AI Code Review

# DISABLED — requires ANTHROPIC_API_KEY which incurs API costs (~$0.003/PR).
# Kept as PoC pattern for enterprise demonstrations (enterprise context).
# To enable: add ANTHROPIC_API_KEY to GitHub Secrets and remove the `if: false` below.
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    name: AI Code Review (claude-haiku)
    if: false  # Disabled — API costs money. Remove this line to enable.
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run AI PR Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python scripts/ai_pr_review.py

      # FAIL verdict causes exit code 1 → this step is the soft gate
      # To make FAIL a hard block, add: required: true in branch protection rules
