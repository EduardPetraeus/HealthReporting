# =============================================================================
# deploy.yml — GitHub Actions CI/CD for Databricks Asset Bundles
#
# Branching strategy:
#   feature/** | fix/** | docs/** | refactor/**
#     → validate bundle on PR
#     → deploy to dev on push
#   main
#     → deploy to production on merge
#
# Required GitHub secrets (configured in GitHub → Settings → Secrets):
#   DATABRICKS_HOST_DEV    — https://<dev-workspace>.azuredatabricks.net
#   DATABRICKS_TOKEN_DEV   — Databricks PAT or service principal token (dev)
#   DATABRICKS_HOST_PRD    — https://<prd-workspace>.azuredatabricks.net
#   DATABRICKS_TOKEN_PRD   — Databricks PAT or service principal token (prd)
#
# If a secret is missing, the job exits cleanly with a skip message (safety fallback).
# =============================================================================

name: Deploy Databricks Bundle

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "docs/**"
      - "refactor/**"
    paths:
      - health_unified_platform/health_environment/deployment/databricks/**
      - health_unified_platform/health_environment/config/databricks/**
      - health_unified_platform/health_environment/orchestration/**
      - health_unified_platform/health_platform/transformation_logic/databricks/**

  # Validate runs on every PR — no path filter.
  # This ensures the required status check always runs regardless of which files changed.
  # Deploy jobs (push) still use path filters to avoid unnecessary deployments.
  pull_request:
    branches:
      - main

  # Manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      target:
        description: "Bundle target to deploy (dev | prd)"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prd

jobs:
  # ---------------------------------------------------------------------------
  # Validate — runs on every PR to main
  # ---------------------------------------------------------------------------
  validate:
    name: Validate bundle
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check if Databricks dev credentials are configured
        id: check-dev
        run: |
          if [ -z "$DATABRICKS_HOST" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️  DATABRICKS_HOST_DEV not configured — skipping bundle validate. Add secrets to enable."
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}

      - name: Set up Databricks CLI
        if: steps.check-dev.outputs.configured == 'true'
        uses: databricks/setup-cli@main

      - name: Validate bundle (dev)
        if: steps.check-dev.outputs.configured == 'true'
        working-directory: health_unified_platform
        run: databricks bundle validate --target dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEV }}

  # ---------------------------------------------------------------------------
  # Deploy to dev — runs on push to feature branches
  # ---------------------------------------------------------------------------
  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref != 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'dev')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check if Databricks dev credentials are configured
        id: check-dev
        run: |
          if [ -z "$DATABRICKS_HOST" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️  DATABRICKS_HOST_DEV not configured — skipping deploy to dev. Add secrets to enable."
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}

      - name: Set up Databricks CLI
        if: steps.check-dev.outputs.configured == 'true'
        uses: databricks/setup-cli@main

      - name: Deploy bundle to dev
        if: steps.check-dev.outputs.configured == 'true'
        working-directory: health_unified_platform
        run: databricks bundle deploy --target dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEV }}

  # ---------------------------------------------------------------------------
  # Deploy to production — runs on merge to main
  # ---------------------------------------------------------------------------
  deploy-prd:
    name: Deploy to production
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prd')
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check if Databricks prd credentials are configured
        id: check-prd
        run: |
          if [ -z "$DATABRICKS_HOST" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️  DATABRICKS_HOST_PRD not configured — skipping deploy to prd. Add secrets to enable."
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PRD }}

      - name: Set up Databricks CLI
        if: steps.check-prd.outputs.configured == 'true'
        uses: databricks/setup-cli@main

      - name: Deploy bundle to production
        if: steps.check-prd.outputs.configured == 'true'
        working-directory: health_unified_platform
        run: databricks bundle deploy --target prd
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PRD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PRD }}
