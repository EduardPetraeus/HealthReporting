# =============================================================================
# ci.yml — Consolidated CI pipeline for HealthReporting
#
# Runs on every PR to main + push to main. Blocks merge on failure.
# Jobs: test (pytest + coverage), lint (ruff), security, governance, deps audit
#
# Replaces: standards-check.yml + governance-check.yml
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Test — pytest with coverage
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e "." 2>/dev/null || true
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            -m "not integration" \
            --cov=health_platform \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --tb=short \
            -q

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Lint — ruff (blocking)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.9"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check (non-blocking)
        run: ruff format --check . || true
        # Non-blocking until existing 106 files are reformatted (separate task)

  # ---------------------------------------------------------------------------
  # Security — secret scanning + .gitignore validation
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Check for secrets in codebase
        run: |
          PATTERNS=(
            'AKIA[0-9A-Z]{16}'                   # AWS access key
            'sk-[a-zA-Z0-9]{48}'                  # OpenAI key (classic)
            'sk-proj-[a-zA-Z0-9\-_]{48,}'         # OpenAI key (project format)
            'sk-ant-[a-zA-Z0-9\-]{80,}'           # Anthropic key
            'ghp_[a-zA-Z0-9]{36}'                 # GitHub PAT
            'dapi[a-f0-9]{32}'                    # Databricks PAT
            'AIza[0-9A-Za-z\-_]{35}'              # Google/Gemini API key
          )

          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            if grep -rPl "$pattern" --include="*.py" --include="*.yaml" --include="*.yml" --include="*.md" --include="*.json" --include="*.sh" --include="*.toml" --include="*.cfg" . 2>/dev/null | grep -v '.git/'; then
              echo "SECURITY: Potential secret detected matching pattern: $pattern"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo "Secrets detected. Remove them before merging."
            exit 1
          fi
          echo "No secrets detected."

      - name: Check .gitignore includes .env
        run: |
          if grep -qE '^\s*\.env\s*$|^\s*\.env\*|^\s*\.env/' .gitignore; then
            echo ".gitignore includes .env entries."
          else
            echo "ERROR: .gitignore does not include .env."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Governance — naming conventions + governance check
  # ---------------------------------------------------------------------------
  governance:
    name: Governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Run governance check
        run: python scripts/governance_check.py

      - name: Run naming conventions check
        run: python scripts/validate_naming.py

  # ---------------------------------------------------------------------------
  # Dependency audit — pip-audit for known CVEs
  # ---------------------------------------------------------------------------
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e "." 2>/dev/null || true

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit --desc \
            --ignore-vuln GHSA-w853-jp5j-5j7f \
            --ignore-vuln GHSA-qmgc-5h2g-mvrw \
            --ignore-vuln GHSA-f83h-ghpp-7wcc \
            --ignore-vuln GHSA-cfh3-3jmp-rvhc
          # GHSA-w853-jp5j-5j7f: filelock <3.16.1 — requires Python 3.10+, CI runs 3.9. Accepted 2026-03-10.
          # GHSA-qmgc-5h2g-mvrw: filelock <3.16.1 — same transitive dep. Accepted 2026-03-10.
          # GHSA-f83h-ghpp-7wcc: pdfminer-six pickle deserialization — local-only usage, no untrusted input. Accepted 2026-03-13.
          # GHSA-cfh3-3jmp-rvhc: pillow PSD OOB write — not processing untrusted images. Accepted 2026-03-13.
