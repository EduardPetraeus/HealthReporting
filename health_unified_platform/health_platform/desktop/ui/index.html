<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HealthReporting</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-header">
        <h1>Health</h1>
        <div class="subtitle">Personal Health Platform</div>
    </div>
    <div class="sidebar-nav">
        <button class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')">
            <span class="icon">&#x1F4CA;</span> Dashboard
        </button>
        <button class="nav-item" id="nav-chat" onclick="navigate('chat')">
            <span class="icon">&#x1F4AC;</span> Chat
        </button>
        <button class="nav-item" id="nav-reports" onclick="navigate('reports')">
            <span class="icon">&#x1F4C4;</span> Reports
        </button>
        <button class="nav-item" id="nav-explorer" onclick="navigate('explorer')">
            <span class="icon">&#x1F50D;</span> Explorer
        </button>
    </div>
    <div class="sidebar-footer">
        <span class="status-dot"></span>
        <span id="db-status">Connecting...</span>
    </div>
</div>

<!-- Main Content -->
<div class="main-content">

    <!-- Dashboard Page -->
    <div class="page active" id="page-dashboard">
        <div id="dashboard-content">
            <div class="loading">Loading dashboard</div>
        </div>
    </div>

    <!-- Chat Page -->
    <div class="page" id="page-chat">
        <div class="chat-container">
            <div class="chat-messages" id="chat-messages">
                <div class="msg bot">
                    <div class="bot-label">Health Assistant</div>
                    <p>Hej! Stil mig et spørgsmål om din sundhed.</p>
                    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px">
                        <button class="quick-action" onclick="quickChat('Hvordan har jeg sovet den seneste uge?')">Sleep</button>
                        <button class="quick-action" onclick="quickChat('Hvad er min readiness og energi?')">Energy</button>
                        <button class="quick-action" onclick="quickChat('Hvor mange skridt har jeg gået?')">Steps</button>
                        <button class="quick-action" onclick="quickChat('Giv mig et overblik over min sundhed')">Overview</button>
                    </div>
                </div>
            </div>
            <div class="chat-input">
                <input type="text" id="chat-input" placeholder="Ask about your health..."
                       onkeydown="if(event.key==='Enter')sendChat()">
                <button onclick="sendChat()" aria-label="Send">
                    <svg viewBox="0 0 24 24"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94l18.04-8.01a.75.75 0 000-1.36L3.478 2.405z"/></svg>
                </button>
                <button onclick="clearChatHistory()" aria-label="Clear history" class="clear-btn" title="Clear chat history">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="currentColor"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Reports Page (Session 3) -->
    <div class="page" id="page-reports">
        <div class="placeholder-page">
            <div class="icon">&#x1F4C4;</div>
            <h2>PDF Reports</h2>
            <p>Coming in Session 3 — date picker, preview, and PDF export.</p>
        </div>
    </div>

    <!-- Explorer Page -->
    <div class="page" id="page-explorer">
        <h2 style="margin-bottom:20px;font-size:20px;font-weight:700">Data Explorer</h2>
        <div class="explorer-controls">
            <select id="explorer-metric">
                <option value="sleep_score">sleep score</option>
            </select>
            <select id="explorer-computation">
                <option value="daily_value">Daily Value</option>
                <option value="period_average">Period Average</option>
                <option value="trend">Trend</option>
                <option value="distribution">Distribution</option>
            </select>
            <select id="explorer-range">
                <option value="last_7_days">Last 7 Days</option>
                <option value="last_14_days">Last 14 Days</option>
                <option value="last_30_days">Last 30 Days</option>
                <option value="last_90_days">Last 90 Days</option>
            </select>
            <button onclick="runExplorer()">Query</button>
        </div>
        <div class="explorer-result" id="explorer-result">Select a metric and click Query.</div>
    </div>

</div>

<script src="js/chart.min.js"></script>
<script src="js/charts.js"></script>
<script src="js/app.js"></script>
</body>
</html>
