version: 2

models:

  # ===========================================================================
  # Oura — Daily aggregates
  # ===========================================================================

  - name: daily_sleep
    description: "Daily sleep scores and contributor breakdowns from Oura Ring."
    columns:
      - name: business_key_hash
        tests:
          - not_null
          - unique
      - name: sk_date
        tests:
          - not_null
      - name: day
        tests:
          - not_null
      - name: sleep_score
        tests:
          - not_null

  - name: daily_readiness
    description: "Daily readiness scores and contributor breakdowns from Oura Ring."
    columns:
      - name: business_key_hash
        tests:
          - not_null
          - unique
      - name: sk_date
        tests:
          - not_null
      - name: day
        tests:
          - not_null
      - name: readiness_score
        tests:
          - not_null

  - name: daily_activity
    description: "Daily activity metrics including steps, calories, and scores from Oura Ring."
    columns:
      - name: business_key_hash
        tests:
          - not_null
          - unique
      - name: sk_date
        tests:
          - not_null
      - name: day
        tests:
          - not_null

  - name: daily_stress
    description: "Daily stress and recovery summaries from Oura Ring."
    columns:
      - name: business_key_hash
        tests:
          - not_null
          - unique
      - name: sk_date
        tests:
          - not_null
      - name: day
        tests:
          - not_null

  - name: daily_spo2
    description: "Daily blood oxygen averages and breathing disturbance index from Oura Ring."
    columns:
      - name: business_key_hash
        tests:
          - not_null
          - unique
      - name: sk_date
        tests:
          - not_null
      - name: day
        tests:
          - not_null

  - name: workout
    description: "Unified workout records from Oura, Lifesum, and Strava."
    columns:
      - name: business_key_hash
        tests:
          - not_null
          - unique
      - name: sk_date
        tests:
          - not_null

  - name: blood_oxygen
    description: "Event-level blood oxygen readings from Oura Ring."
    columns:
      - name: business_key_hash
        tests:
          - not_null
          - unique
      - name: sk_date
        tests:
          - not_null

  - name: personal_info
    description: "User profile information from Oura Ring."
    columns:
      - name: business_key_hash
        tests:
          - not_null
          - unique

