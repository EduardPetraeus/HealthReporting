# =============================================================================
# cluster_config.yml — Databricks cluster configuration templates
# =============================================================================

clusters:
  # Development cluster — small, single-node for testing
  dev_pipeline:
    cluster_name: "health-pipeline-dev"
    spark_version: "14.3.x-scala2.12"
    node_type_id: "Standard_DS3_v2"
    num_workers: 0
    autoscale:
      min_workers: 0
      max_workers: 1
    autotermination_minutes: 30
    spark_conf:
      spark.databricks.delta.preview.enabled: "true"
      spark.databricks.delta.merge.enableLowShuffle: "true"
      spark.sql.adaptive.enabled: "true"
    custom_tags:
      environment: dev
      project: health_platform
      cost_center: personal

  # Production pipeline cluster — autoscaling for daily runs
  prd_pipeline:
    cluster_name: "health-pipeline-prd"
    spark_version: "14.3.x-scala2.12"
    node_type_id: "Standard_DS4_v2"
    num_workers: 1
    autoscale:
      min_workers: 1
      max_workers: 4
    autotermination_minutes: 20
    spark_conf:
      spark.databricks.delta.preview.enabled: "true"
      spark.databricks.delta.merge.enableLowShuffle: "true"
      spark.databricks.delta.optimizeWrite.enabled: "true"
      spark.databricks.delta.autoCompact.enabled: "true"
      spark.sql.adaptive.enabled: "true"
      spark.sql.adaptive.coalescePartitions.enabled: "true"
    spark_env_vars:
      HEALTH_ENV: prd
    custom_tags:
      environment: prd
      project: health_platform
      cost_center: personal

  # SQL warehouse for gold layer queries (serverless)
  gold_sql_warehouse:
    warehouse_name: "health-gold-warehouse"
    warehouse_type: PRO
    cluster_size: "2X-Small"
    min_num_clusters: 1
    max_num_clusters: 2
    auto_stop_mins: 15
    enable_serverless_compute: true
    tags:
      environment: prd
      project: health_platform
      layer: gold
