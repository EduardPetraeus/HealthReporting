# =============================================================================
# daily_pipeline.yml — DAB job definition for daily health data pipeline
#
# Schedule: Daily at 06:00 UTC
# Flow: bronze (autoloader) -> silver (merge) -> gold (views/tables)
# =============================================================================

resources:
  jobs:
    daily_health_pipeline:
      name: "[${var.env}] health_platform — daily_pipeline"
      description: >
        End-to-end daily health data pipeline.
        Ingests raw data from all sources (bronze), transforms and deduplicates (silver),
        and refreshes gold views and dimension tables.

      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: UTC
        pause_status: UNPAUSED

      tags:
        pipeline: daily
        layer: full_stack
        project: health_platform

      job_clusters:
        - job_cluster_key: pipeline_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            num_workers: ${var.num_workers}
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"
              health.landing_zone: ${var.landing_zone}
              health.checkpoint_root: ${var.checkpoint_root}
              health.schema_root: ${var.schema_root}

      tasks:
        # =============================================================
        # Phase 1: Bronze ingestion (parallel per source)
        # =============================================================
        - task_key: bronze_autoloader
          job_cluster_key: pipeline_cluster
          notebook_task:
            notebook_path: ../bronze/bronze_autoloader.py
            base_parameters:
              source_name: ""
              config_root: ${var.config_root}
          timeout_seconds: 3600

        # =============================================================
        # Phase 2: Silver transformations (depends on bronze)
        # =============================================================
        - task_key: silver_transforms
          depends_on:
            - task_key: bronze_autoloader
          job_cluster_key: pipeline_cluster
          notebook_task:
            notebook_path: ../silver/silver_runner.py
            base_parameters:
              source_name: ""
              config_root: ${var.config_root}
              sql_root: ${var.silver_sql_root}
          timeout_seconds: 3600

        # =============================================================
        # Phase 3: Gold views and tables (depends on silver)
        # =============================================================
        - task_key: gold_views
          depends_on:
            - task_key: silver_transforms
          job_cluster_key: pipeline_cluster
          notebook_task:
            notebook_path: ../gold/gold_runner.py
            base_parameters:
              entity_name: ""
              config_root: ${var.gold_config_root}
              sql_root: ${var.gold_sql_root}
          timeout_seconds: 1800

      email_notifications:
        on_failure:
          - ${var.alert_email}
