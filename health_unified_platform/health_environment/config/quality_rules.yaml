# quality_rules.yaml — Data quality rules for all silver tables.
#
# Check types:
#   not_null:    list of columns that must not contain NULL
#   unique:      list of columns that must be unique
#   freshness:   { column: <date_col>, max_hours: <int> }
#   row_count:   { min_rows: <int> }
#   value_range: { <column>: { min: <num>, max: <num> } }
#
# Tables are keyed by silver table name (without schema prefix).

tables:

  # =====================================================================
  # Oura — Daily aggregates
  # =====================================================================

  daily_sleep:
    not_null: [business_key_hash, sk_date, day, sleep_score]
    unique: [business_key_hash]
    freshness: { column: day, max_hours: 49 }
    row_count: { min_rows: 1 }
    value_range:
      sleep_score: { min: 0, max: 100 }
    completeness: { column: day, grain: daily, max_gaps: 0 }

  daily_readiness:
    not_null: [business_key_hash, sk_date, day, readiness_score]
    unique: [business_key_hash]
    freshness: { column: day, max_hours: 49 }
    row_count: { min_rows: 1 }
    value_range:
      readiness_score: { min: 0, max: 100 }
    completeness: { column: day, grain: daily, max_gaps: 0 }

  daily_activity:
    not_null: [business_key_hash, sk_date, day]
    unique: [business_key_hash]
    freshness: { column: day, max_hours: 49 }
    row_count: { min_rows: 1 }
    value_range:
      activity_score: { min: 0, max: 100 }
      steps: { min: 0, max: 100000 }
    completeness: { column: day, grain: daily, max_gaps: 0 }

  daily_stress:
    not_null: [business_key_hash, sk_date, day]
    unique: [business_key_hash]
    freshness: { column: day, max_hours: 49 }
