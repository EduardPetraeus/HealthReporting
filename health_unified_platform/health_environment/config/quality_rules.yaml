    row_count: { min_rows: 1 }
    value_range:
      spo2_avg_pct: { min: 50, max: 100 }
    completeness: { column: day, grain: daily, max_gaps: 0 }

  workout:
    not_null: [business_key_hash, sk_date]
    unique: [business_key_hash]
    row_count: { min_rows: 1 }

  blood_oxygen:
    not_null: [business_key_hash, sk_date]
    unique: [business_key_hash]
    row_count: { min_rows: 1 }

