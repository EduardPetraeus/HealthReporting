    relative_path: "manual/lab_results/**/*.yaml"
    source_type: "yaml"
    target_schema: "silver"
    target_table: "lab_results"

  - name: "manual_supplements"
    # Supplement protocol — YAML file imported via import_manual_data.py
    relative_path: "manual/supplement_protocol.yaml"
    source_type: "yaml"
    target_schema: "silver"
    target_table: "supplement_log"