  # Withings endpoints (OAuth2 API, fetched via source_connectors/withings/run_withings.py)
  - name: "withings_weight"
    # Weight and body composition (fat%, muscle%, bone%, hydration%)
    relative_path: "withings/raw/weight/**/*.parquet"
    source_type: "parquet"
    target_schema: "bronze"
    target_table: "stg_withings_weight"

