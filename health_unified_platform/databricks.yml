# =============================================================================
# databricks.yml — Health Platform Asset Bundle
# =============================================================================
# Bundle root: health_unified_platform/
#
# Run all `databricks bundle` commands from this directory:
#   cd health_unified_platform
#   databricks bundle deploy --target dev
#   databricks bundle deploy --target prd
#
# Notebooks: health_platform/transformation_logic/databricks/
# Configs:   health_environment/config/databricks/
# Workflows: health_environment/orchestration/
# =============================================================================

bundle:
  name: health_platform

# Include job resource YAML files from orchestration/
include:
  - health_environment/orchestration/*.yml

# Sync notebooks and config files relative to this databricks.yml (health_unified_platform/).
sync:
  include:
    - health_environment/config/databricks/**
    - health_platform/transformation_logic/databricks/**

# ---------------------------------------------------------------------------
# Variables — overridden per target
# ---------------------------------------------------------------------------
variables:
  env:
    description: "Deployment environment (dev | prd)"
    default: dev

  catalog:
    description: "Unity Catalog name"
    default: health-platform-dev

  cluster_node_type:
    description: "Node type for job clusters (AWS: i3.xlarge | Azure: Standard_DS3_v2)"
    default: i3.xlarge

  config_root:
    description: "Workspace path to source YAML configs after bundle deployment"
    default: /Workspace/Shared/health_platform/config/sources

  gold_config_root:
    description: "Workspace path to gold YAML configs after bundle deployment"
    default: /Workspace/Shared/health_platform/config/gold

  silver_sql_root:
    description: "Workspace path to silver SQL files after bundle deployment"
    default: /Workspace/Shared/health_platform/notebooks/silver/sql

  gold_sql_root:
    description: "Workspace path to gold SQL files after bundle deployment"
    default: /Workspace/Shared/health_platform/notebooks/gold/sql

# ---------------------------------------------------------------------------
# Targets — both use the same workspace, separated by Unity Catalog
# NOTE: workspace host is a public URL (requires PAT for access).
# To avoid hardcoding, set profile: DEFAULT and use ~/.databrickscfg instead.
# ---------------------------------------------------------------------------
targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-23749322-8818.cloud.databricks.com
    variables:
      env: dev
      catalog: health-platform-dev

  prd:
    mode: production
    workspace:
      host: https://dbc-23749322-8818.cloud.databricks.com
      root_path: /Workspace/Shared/${bundle.name}/${bundle.target}
    variables:
      env: prd
      catalog: health-platform-prd
